name: Documentation
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate KDocs
        run: ./gradlew dokkaGenerateHtml

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - run: pip install zensical

      - run: zensical build --clean
        working-directory: website/readingbat-core

      - name: Copy KDocs into Zensical site
        run: cp -r readingbat-core/build/dokka/html website/readingbat-core/site/kdocs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: website/readingbat-core/site

      - uses: actions/deploy-pages@v5
        id: deployment
